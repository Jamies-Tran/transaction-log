services:
  transaction-log-db:
    image: mongo:latest
    container_name: transaction-log-db
    networks:
      - transaction-log-network
    volumes:
      - transaction-log-db:/transaction-log/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: TRANSACTION_LOG
      MONGO_INITDB_ROOT_PASSWORD: 123
      MONGO_INITDB_DATABASE: transaction-log
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      retries: 3
      interval: 5s
      timeout: 10s

  transaction-log-service:
    build: .
    container_name: transaction-log-service
    networks:
      - transaction-log-network
    expose:
      - 8080
    environment:
      SPRING_MONGODB_USERNAME: TRANSACTION_LOG
      SPRING_MONGODB_PASSWORD: 123
      SPRING_MONGODB_AUTHENTICATION-DATABASE: transaction-log
    depends_on:
      transaction-log-db:
        condition: service_healthy

  transaction-log-nginx:
    image: nginx:latest
    container_name: transaction-log-nginx
    networks:
      - transaction-log-network
    ports:
      - "8082:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - transaction-log-service


volumes:
  transaction-log-db:

networks:
  transaction-log-network:
    driver: bridge